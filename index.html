<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1E272E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="2FACE CRM — учёт учеников и посещений">
    <title>2FACE CRM</title>
    <link rel="manifest" id="pwa-manifest-link" href="#">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-bg: #F7F8FA;
            --card-bg: #FFFFFF;
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --visit-yes: #34C759;
            --visit-no: #FF3B30;
            --visit-dash: #D1D1D6;
            --tap-transition: transform 0.2s ease, color 0.2s ease, background-color 0.2s ease, opacity 0.2s ease;
        }
        html, body {
            margin: 0;
            font-family: system-ui, -apple-system, "Inter", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            background: var(--app-bg);
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
        }
        body { min-height: 100dvh; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .app-bg {
            background: var(--app-bg);
        }
        .header-glass {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(16px);
            border-color: rgba(0, 0, 0, 0.06) !important;
        }
        .active-tab-indicator {
            position: absolute; top: -8px; width: 22px; height: 3px; border-radius: 99px;
            background: #fff; box-shadow: 0 0 10px rgba(255, 255, 255, 0.45);
        }
        .sheet-shadow { box-shadow: 0 -14px 42px rgba(0, 0, 0, 0.1); }
        .drawer-scroll { -webkit-overflow-scrolling: touch; }
        .student-row-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: var(--tap-transition);
        }
        .student-row-card:active {
            transform: scale(0.98);
        }
        .att-sticky-left {
            position: sticky; left: 0; z-index: 2;
            background: linear-gradient(90deg, #fff 88%, rgba(255,255,255,0) 100%);
            box-shadow: 6px 0 14px rgba(0, 0, 0, 0.04);
        }
        .att-scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .visit-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 1.125rem;
            font-weight: 700;
            transition: var(--tap-transition);
        }
        .visit-mark--yes { color: var(--visit-yes); }
        .visit-mark--no { color: var(--visit-no); }
        .visit-mark--dash { color: var(--visit-dash); font-weight: 500; }
        .visit-cell-btn {
            transition: var(--tap-transition);
        }
        .visit-cell-btn:active {
            transform: scale(0.92);
            opacity: 0.85;
        }
        .lesson-header-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="safe-bottom">
    <div id="root"></div>

    <script type="text/babel">
        const { useMemo, useState, useEffect, useCallback, useRef } = React;

        const STORAGE_KEY = '2face_v4_final';
        const LEGACY_KEYS = ['2face_students_final', '2face_subjects_final'];
        const CATEGORY_IDS = ['children', 'teens', 'women', 'intensive'];

        const CATEGORIES = [
            { id: 'children', label: 'Дети' },
            { id: 'teens', label: 'Подростки' },
            { id: 'women', label: '2 группы' },
            { id: 'intensive', label: 'Интенсив' }
        ];

        const defaultSubjects = () => ['Дефиле', 'Актёрское', 'Пластика'];

        function uid() {
            return `${Date.now()}_${Math.random().toString(16).slice(2, 9)}`;
        }

        function todayISO() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function addDaysISO(iso, days) {
            const [y, m, d] = String(iso || todayISO()).split('-').map(Number);
            const dt = new Date(y, m - 1, d);
            dt.setDate(dt.getDate() + days);
            const yy = dt.getFullYear();
            const mm = String(dt.getMonth() + 1).padStart(2, '0');
            const dd = String(dt.getDate()).padStart(2, '0');
            return `${yy}-${mm}-${dd}`;
        }

        function formatDateShort(iso) {
            if (!iso) return '—';
            const [y, m, d] = iso.split('-').map(Number);
            const dt = new Date(y, m - 1, d);
            if (Number.isNaN(dt.getTime())) return iso;
            return dt.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
        }

        function formatDateFull(iso) {
            if (!iso) return '—';
            const [y, m, d] = iso.split('-').map(Number);
            const dt = new Date(y, m - 1, d);
            if (Number.isNaN(dt.getTime())) return iso;
            return dt.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function formatMoney(amount) {
            const n = Number(amount);
            if (!Number.isFinite(n)) return `${amount || 0}`;
            return n.toLocaleString('ru-RU');
        }

        /** Дата внутри [from, until] включительно */
        function isDateInInclusiveRange(iso, from, until) {
            if (!iso || !from || !until) return false;
            return iso >= from && iso <= until;
        }

        /** Активный платёж: сегодня между paidFrom и paidUntil */
        function getActivePayment(payments) {
            const t = todayISO();
            const list = Array.isArray(payments) ? payments : [];
            return list.find((p) => isDateInInclusiveRange(t, p.paidFrom, p.paidUntil)) || null;
        }

        function abonnementStatusLine(student) {
            const active = getActivePayment(student.payments);
            if (active) return { text: `до ${formatDateShort(active.paidUntil)}`, ok: true };
            return { text: 'не оплачено', ok: false };
        }

        /** Посещение: 0 —, 1 ✅, 2 ❌ */
        function cycleVisit(v) {
            return ((Number(v) || 0) + 1) % 3;
        }

        /** Отображение посещения: цвета через CSS-классы (не emoji — стабильнее на iOS) */
        function visitMarkNode(v) {
            const n = Number(v) || 0;
            if (n === 1) return <span className="visit-mark visit-mark--yes">✓</span>;
            if (n === 2) return <span className="visit-mark visit-mark--no">✕</span>;
            return <span className="visit-mark visit-mark--dash">—</span>;
        }

        function defaultLessonColumnsForCategory(categoryId, subjectTitles) {
            const titles = subjectTitles.length ? subjectTitles : defaultSubjects();
            return titles.slice(0, 3).map((title, i) => ({
                id: `${categoryId}_lesson_${i}_${uid()}`,
                title: String(title || 'Занятие'),
                date: addDaysISO(todayISO(), i * 2)
            }));
        }

        function ensureLessonColumnsMap(raw, subjectTitles) {
            const base = raw && typeof raw === 'object' ? { ...raw } : {};
            CATEGORY_IDS.forEach((cid) => {
                if (!Array.isArray(base[cid]) || base[cid].length === 0) {
                    base[cid] = defaultLessonColumnsForCategory(cid, subjectTitles);
                } else {
                    base[cid] = base[cid].map((c) => ({
                        id: c.id || uid(),
                        title: String(c.title || c.name || 'Занятие'),
                        date: c.date || todayISO()
                    }));
                }
            });
            return base;
        }

        /** Периоды для совместимости сохранения / миграции */
        function periodsFromPayments(payments, subjects) {
            const list = Array.isArray(payments) ? payments : [];
            if (!list.length) {
                const t = todayISO();
                return [{
                    id: uid(),
                    paymentDate: t,
                    startDate: t,
                    endDate: addDaysISO(t, 28),
                    amount: 0,
                    isPaid: false,
                    comment: '',
                    lessons: []
                }];
            }
            return list.map((p) => ({
                id: p.id || uid(),
                paymentDate: p.paidAt || p.paidFrom || todayISO(),
                startDate: p.paidFrom || todayISO(),
                endDate: p.paidUntil || addDaysISO(p.paidFrom || todayISO(), 28),
                amount: Number(p.amount ?? 0) || 0,
                isPaid: true,
                comment: '',
                lessons: []
            }));
        }

        function paymentsFromPeriods(periods) {
            const list = Array.isArray(periods) ? periods : [];
            return list.map((p) => ({
                id: p.id || uid(),
                paidFrom: p.startDate || p.paymentDate || todayISO(),
                paidUntil: p.endDate || addDaysISO(p.startDate || todayISO(), 28),
                paidAt: p.paymentDate || p.startDate || todayISO(),
                amount: Number(p.amount ?? p.paymentInfo?.amount ?? 0) || 0
            }));
        }

        function pickCurrentPeriodIndexFromPayments(payments) {
            const t = todayISO();
            const list = Array.isArray(payments) ? payments : [];
            const idx = list.findIndex((p) => isDateInInclusiveRange(t, p.paidFrom, p.paidUntil));
            if (idx >= 0) return idx;
            if (!list.length) return 0;
            const lastActive = [...list].map((p, i) => ({ i, p })).reverse().find(({ p }) => p.paidUntil >= t);
            return lastActive ? lastActive.i : list.length - 1;
        }

        function normalizeStudent(student, subjects) {
            const paymentsRaw = student?.payments;
            let payments = Array.isArray(paymentsRaw) && paymentsRaw.length
                ? paymentsRaw.map((p) => ({
                    id: p.id || uid(),
                    paidFrom: p.paidFrom || todayISO(),
                    paidUntil: p.paidUntil || addDaysISO(p.paidFrom || todayISO(), 28),
                    paidAt: p.paidAt || p.paidFrom || todayISO(),
                    amount: Number(p.amount ?? 0) || 0
                }))
                : paymentsFromPeriods(student?.periods);

            let periods = periodsFromPayments(payments, subjects);
            if (!payments.length && periods.length) {
                payments = periods.map((p) => ({
                    id: p.id || uid(),
                    paidFrom: p.startDate || todayISO(),
                    paidUntil: p.endDate || addDaysISO(p.startDate || todayISO(), 28),
                    paidAt: p.paymentDate || p.startDate || todayISO(),
                    amount: Number(p.amount ?? 0) || 0
                }));
                periods = periodsFromPayments(payments, subjects);
            }
            const currentPeriodIndex = pickCurrentPeriodIndexFromPayments(payments);

            const category = CATEGORY_IDS.includes(student?.category) ? student.category : 'children';
            const attendance = student?.attendance && typeof student.attendance === 'object' ? { ...student.attendance } : {};

            return {
                id: student?.id || uid(),
                name: student?.name || 'Без имени',
                category,
                subGroup: category === 'women' ? (student?.subGroup === 'group2' ? 'group2' : 'group1') : 'default',
                phone: student?.phone || '',
                note: student?.note || '',
                payments,
                periods,
                currentPeriodIndex,
                attendance
            };
        }

        function loadAppState() {
            const subjectsBase = defaultSubjects();
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    const subjects = Array.isArray(parsed?.subjects) && parsed.subjects.length
                        ? parsed.subjects.filter(Boolean)
                        : subjectsBase;
                    const lessonColumnsByCategory = ensureLessonColumnsMap(parsed?.lessonColumnsByCategory, subjects);
                    const students = Array.isArray(parsed?.students)
                        ? parsed.students.map((s) => normalizeStudent(s, subjects))
                        : [];
                    return { subjects, students, lessonColumnsByCategory };
                }
            } catch (e) {}

            try {
                const oldStudentsRaw = localStorage.getItem(LEGACY_KEYS[0]);
                const oldSubjectsRaw = localStorage.getItem(LEGACY_KEYS[1]);
                const oldSubjectsObj = oldSubjectsRaw ? JSON.parse(oldSubjectsRaw) : null;
                const subjects = oldSubjectsObj && typeof oldSubjectsObj === 'object'
                    ? Object.values(oldSubjectsObj).filter(Boolean)
                    : subjectsBase;
                const oldStudents = oldStudentsRaw ? JSON.parse(oldStudentsRaw) : [];
                const students = Array.isArray(oldStudents)
                    ? oldStudents.map((s) => normalizeStudent(s, subjects))
                    : [];
                return {
                    subjects,
                    students,
                    lessonColumnsByCategory: ensureLessonColumnsMap(null, subjects)
                };
            } catch (e) {
                return {
                    subjects: subjectsBase,
                    students: [],
                    lessonColumnsByCategory: ensureLessonColumnsMap(null, subjectsBase)
                };
            }
        }

        /**
         * Сохранение всего состояния в localStorage (ученики, посещения, payments внутри students, колонки занятий, справочник предметов).
         * Вызывается при любом изменении данных и при закрытии вкладки (beforeunload).
         */
        function saveAppState(students, subjects, lessonColumnsByCategory) {
            try {
                const payload = {
                    version: 7,
                    updatedAt: new Date().toISOString(),
                    students,
                    subjects,
                    lessonColumnsByCategory
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
            } catch (e) {
                console.warn('2FACE: не удалось сохранить в localStorage', e);
            }
        }

        function setupPwaManifest() {
            const link = document.getElementById('pwa-manifest-link');
            if (!link) return;
            const manifest = {
                name: '2FACE CRM',
                short_name: '2FACE',
                start_url: './index.html',
                scope: './',
                display: 'standalone',
                background_color: '#F7F8FA',
                theme_color: '#1E272E',
                icons: [{
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%231E272E' width='192' height='192' rx='40'/%3E%3Ctext x='96' y='118' font-size='72' text-anchor='middle' fill='%2355E6C1'%3E2%3C/text%3E%3C/svg%3E",
                    sizes: '192x192',
                    type: 'image/svg+xml'
                }]
            };
            link.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' }));
        }

        /** Редактор колонок занятий для текущей вкладки (название + дата) */
        function LessonColumnsEditor({ columns, onClose, onSave }) {
            const [rows, setRows] = useState(columns.map((c) => ({ ...c })));
            return (
                <div className="fixed inset-0 z-[80]">
                    <div className="absolute inset-0 bg-black/40" onClick={onClose} />
                    <section className="absolute bottom-0 inset-x-0 max-h-[80vh] bg-white rounded-t-[2rem] drawer-scroll overflow-y-auto p-4 safe-bottom sheet-shadow">
                        <div className="w-10 h-1.5 bg-slate-200 rounded-full mx-auto mb-3" />
                        <h3 className="text-base font-bold text-[#1E272E]">Занятия вкладки</h3>
                        <p className="text-xs text-slate-500 mt-0.5">Общие колонки для всех учеников на этой вкладке.</p>
                        <div className="mt-3 space-y-2">
                            {rows.map((r, i) => (
                                <div key={r.id} className="flex flex-col gap-1 sm:flex-row sm:items-center">
                                    <input
                                        value={r.title}
                                        onChange={(e) => setRows((prev) => prev.map((x, j) => j === i ? { ...x, title: e.target.value } : x))}
                                        className="h-10 flex-1 rounded-xl bg-slate-100 px-3 text-sm outline-none focus:ring-2 focus:ring-[#55E6C1]"
                                        placeholder="Название"
                                    />
                                    <input
                                        type="date"
                                        value={r.date}
                                        onChange={(e) => setRows((prev) => prev.map((x, j) => j === i ? { ...x, date: e.target.value } : x))}
                                        className="h-10 w-full sm:w-[150px] rounded-xl bg-slate-100 px-2 text-sm outline-none focus:ring-2 focus:ring-[#55E6C1]"
                                    />
                                </div>
                            ))}
                        </div>
                        <button
                            type="button"
                            onClick={() => onSave(rows.filter((x) => String(x.title || '').trim()))}
                            className="mt-4 h-11 w-full rounded-xl bg-[#1E272E] text-white text-sm font-bold"
                        >
                            Сохранить
                        </button>
                    </section>
                </div>
            );
        }

        /** Форма добавления ученика: только ФИО (без группы / класса) */
        function AddStudentForm({ onCancel, onSave }) {
            const [name, setName] = useState('');
            return (
                <div className="space-y-3">
                    <label className="block">
                        <span className="text-[11px] font-semibold text-slate-500">ФИО</span>
                        <input value={name} onChange={(e) => setName(e.target.value)} className="mt-1 h-11 w-full rounded-xl bg-slate-100 px-3 outline-none focus:ring-2 focus:ring-[#55E6C1]" />
                    </label>
                    <div className="flex gap-2">
                        <button type="button" onClick={onCancel} className="flex-1 h-11 rounded-xl bg-slate-100 text-slate-600 text-sm font-bold">Отмена</button>
                        <button
                            type="button"
                            onClick={() => {
                                const n = name.trim();
                                if (!n) return;
                                onSave({ name: n });
                            }}
                            className="flex-1 h-11 rounded-xl bg-[#1E272E] text-white text-sm font-bold"
                        >
                            Добавить
                        </button>
                    </div>
                </div>
            );
        }

        /** Карточка ученика: абонементы и ФИО — без класса и группы */
        function StudentCardSheet({ student, subjects, onClose, onSaveStudent, onDeleteStudent }) {
            const [name, setName] = useState(student.name);
            const [payments, setPayments] = useState(() => [...(student.payments || [])].sort((a, b) => a.paidFrom.localeCompare(b.paidFrom)));
            const [editTerm, setEditTerm] = useState(false);
            const [showAdd, setShowAdd] = useState(false);
            const active = getActivePayment(payments);
            const activeIdx = active ? payments.findIndex((p) => p.id === active.id) : -1;

            const [newPaidAt, setNewPaidAt] = useState(todayISO());
            const [newUntil, setNewUntil] = useState(addDaysISO(todayISO(), 28));
            const [termFrom, setTermFrom] = useState(active?.paidFrom || todayISO());
            const [termUntil, setTermUntil] = useState(active?.paidUntil || addDaysISO(todayISO(), 28));

            useEffect(() => {
                if (active) {
                    setTermFrom(active.paidFrom);
                    setTermUntil(active.paidUntil);
                }
            }, [student.id, active?.id, active?.paidFrom, active?.paidUntil]);

            const persist = () => {
                onSaveStudent(normalizeStudent({ ...student, name: name.trim() || student.name, payments }, subjects));
            };

            const handleSave = () => {
                onSaveStudent(normalizeStudent({ ...student, name: name.trim() || student.name, payments }, subjects));
                onClose();
            };

            const applyTermChange = () => {
                if (activeIdx < 0) return;
                const next = payments.map((p, i) => i === activeIdx ? { ...p, paidFrom: termFrom, paidUntil: termUntil } : p);
                setPayments(next.sort((a, b) => a.paidFrom.localeCompare(b.paidFrom)));
                onSaveStudent(normalizeStudent({ ...student, name: name.trim() || student.name, payments: next }, subjects));
                setEditTerm(false);
            };

            const addPaymentPeriod = () => {
                const from = newPaidAt || todayISO();
                const until = newUntil || addDaysISO(from, 28);
                const row = {
                    id: uid(),
                    paidFrom: from,
                    paidUntil: until,
                    paidAt: from,
                    amount: 0
                };
                const next = [...payments, row].sort((a, b) => a.paidFrom.localeCompare(b.paidFrom));
                setPayments(next);
                onSaveStudent(normalizeStudent({ ...student, name: name.trim() || student.name, payments: next }, subjects));
                setShowAdd(false);
                setNewPaidAt(todayISO());
                setNewUntil(addDaysISO(todayISO(), 28));
            };

            useEffect(() => {
                if (showAdd) setNewUntil(addDaysISO(newPaidAt || todayISO(), 28));
            }, [newPaidAt, showAdd]);

            return (
                <div className="fixed inset-0 z-[75]">
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-[1px]" onClick={onClose} />
                    <section className="absolute bottom-0 inset-x-0 max-h-[90vh] bg-white rounded-t-[2rem] drawer-scroll overflow-y-auto safe-bottom sheet-shadow">
                        <header className="sticky top-0 z-10 header-glass border-b border-slate-100 px-4 py-3">
                            <div className="w-10 h-1.5 bg-slate-200 rounded-full mx-auto mb-3" />
                            <div className="flex justify-between items-start gap-2">
                                <h3 className="text-lg font-extrabold text-[#1E272E]">Карточка ученика</h3>
                                <button type="button" onClick={onClose} className="h-8 px-2.5 rounded-lg bg-slate-100 text-slate-600 text-xs font-bold">Закрыть</button>
                            </div>
                        </header>
                        <div className="px-4 py-4 space-y-4">
                            <label className="block">
                                <span className="text-[11px] font-semibold text-slate-500">ФИО</span>
                                <input value={name} onChange={(e) => setName(e.target.value)} onBlur={persist} className="mt-1 h-11 w-full rounded-xl bg-slate-100 px-3 outline-none focus:ring-2 focus:ring-[#55E6C1]" />
                            </label>

                            <section className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                                <p className="text-xs font-bold text-slate-600 uppercase tracking-wide">Текущий период абонемента</p>
                                {active ? (
                                    <div className="mt-2 text-sm text-[#1E272E]">
                                        <p>{formatDateFull(active.paidFrom)} — {formatDateFull(active.paidUntil)}</p>
                                        {active.amount > 0 ? <p className="text-xs text-slate-500 mt-1">Сумма: {formatMoney(active.amount)} ₽</p> : null}
                                    </div>
                                ) : (
                                    <p className="mt-2 text-sm text-rose-600 font-medium">Нет активного периода (не оплачено)</p>
                                )}
                                {editTerm && activeIdx >= 0 ? (
                                    <div className="mt-3 space-y-2">
                                        <label className="block text-[11px] font-semibold text-slate-500">Срок с</label>
                                        <input type="date" value={termFrom} onChange={(e) => setTermFrom(e.target.value)} className="h-10 w-full rounded-lg bg-white border border-slate-200 px-2" />
                                        <label className="block text-[11px] font-semibold text-slate-500">Срок по</label>
                                        <input type="date" value={termUntil} onChange={(e) => setTermUntil(e.target.value)} className="h-10 w-full rounded-lg bg-white border border-slate-200 px-2" />
                                        <div className="flex gap-2 pt-1">
                                            <button type="button" onClick={() => setEditTerm(false)} className="flex-1 h-9 rounded-lg bg-slate-200 text-sm font-bold">Отмена</button>
                                            <button type="button" onClick={applyTermChange} className="flex-1 h-9 rounded-lg bg-[#1E272E] text-white text-sm font-bold">Применить срок</button>
                                        </div>
                                    </div>
                                ) : null}
                            </section>

                            <section>
                                <p className="text-xs font-bold text-slate-600 uppercase tracking-wide mb-2">История оплат (периоды)</p>
                                <ul className="space-y-2 max-h-40 overflow-y-auto">
                                    {[...payments].sort((a, b) => b.paidFrom.localeCompare(a.paidFrom)).map((p) => (
                                        <li key={p.id} className="rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs text-slate-700">
                                            <span className="font-semibold">{formatDateFull(p.paidFrom)} — {formatDateFull(p.paidUntil)}</span>
                                            {p.amount > 0 ? <span className="text-slate-500"> · {formatMoney(p.amount)} ₽</span> : null}
                                        </li>
                                    ))}
                                </ul>
                            </section>

                            {showAdd ? (
                                <section className="rounded-2xl border border-[#55E6C1]/40 bg-emerald-50/40 p-3 space-y-2">
                                    <p className="text-xs font-bold text-[#1E272E]">Новый период</p>
                                    <label className="block text-[11px] font-semibold text-slate-500">Дата оплаты / начала</label>
                                    <input type="date" value={newPaidAt} onChange={(e) => setNewPaidAt(e.target.value)} className="h-10 w-full rounded-lg bg-white border border-slate-200 px-2" />
                                    <label className="block text-[11px] font-semibold text-slate-500">Действует до (+28 дней, можно изменить)</label>
                                    <input type="date" value={newUntil} onChange={(e) => setNewUntil(e.target.value)} className="h-10 w-full rounded-lg bg-white border border-slate-200 px-2" />
                                    <div className="flex gap-2 pt-1">
                                        <button type="button" onClick={() => setShowAdd(false)} className="flex-1 h-9 rounded-lg bg-slate-200 text-sm font-bold">Отмена</button>
                                        <button type="button" onClick={addPaymentPeriod} className="flex-1 h-9 rounded-lg bg-[#1E272E] text-white text-sm font-bold">Создать</button>
                                    </div>
                                </section>
                            ) : null}

                            <div className="flex flex-col gap-2">
                                <button type="button" onClick={() => setEditTerm((v) => !v)} disabled={activeIdx < 0} className="h-10 rounded-xl bg-slate-100 text-slate-800 text-sm font-bold disabled:opacity-40">Изменить срок</button>
                                <button type="button" onClick={() => setShowAdd((s) => !s)} className="h-10 rounded-xl bg-[#E8F8F2] text-[#1E272E] text-sm font-bold">+ Добавить новый период</button>
                                <button type="button" onClick={handleSave} className="h-11 rounded-xl bg-[#1E272E] text-white text-sm font-bold">Сохранить</button>
                            </div>

                            <button
                                type="button"
                                onClick={() => {
                                    if (confirm('Удалить ученика?')) {
                                        onDeleteStudent(student.id);
                                        onClose();
                                    }
                                }}
                                className="w-full h-10 rounded-xl bg-rose-50 text-rose-700 text-sm font-bold"
                            >
                                Удалить ученика
                            </button>
                        </div>
                    </section>
                </div>
            );
        }

        /** Список: одна горизонтальная прокрутка для шапки и строк; каждая строка — карточка */
        function AttendanceTable({ students, columns, onCellTap, onRowOpen }) {
            const colw = 'min-w-[80px] w-[80px] shrink-0';
            const leftCol = 'shrink-0 w-[148px] sm:w-[168px]';
            return (
                <div className="att-scroll-x -mx-1 px-1">
                    <div className="inline-flex min-w-full flex-col gap-0 pb-1">
                        <div className="lesson-header-card flex w-max min-w-full items-stretch">
                            <div className={`${leftCol} pr-2 flex items-center att-sticky-left`}>
                                <span className="text-[13px] font-semibold uppercase tracking-wide" style={{ color: 'var(--text-secondary)' }}>Ученик</span>
                            </div>
                            <div className="flex min-h-[52px]">
                                {columns.map((c) => (
                                    <div key={c.id} className={`${colw} px-1 flex flex-col items-center justify-center text-center border-l border-black/[0.04] first:border-l-0`}>
                                        <span className="text-[14px] font-semibold leading-snug line-clamp-2" style={{ color: 'var(--text-primary)' }}>{c.title}</span>
                                        <span className="text-[13px] mt-0.5" style={{ color: 'var(--text-secondary)' }}>{formatDateShort(c.date)}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        {students.map((s) => {
                            const st = abonnementStatusLine(s);
                            return (
                                <div key={s.id} className="student-row-card flex w-max min-w-full items-stretch">
                                    <button
                                        type="button"
                                        onClick={() => onRowOpen(s)}
                                        className={`att-sticky-left ${leftCol} text-left rounded-l-[10px] -m-[2px] mr-0 p-1 pr-2 border-0 bg-transparent self-center`}
                                        style={{ WebkitTapHighlightColor: 'transparent' }}
                                    >
                                        <span className="text-[17px] font-semibold leading-snug line-clamp-2 block" style={{ color: 'var(--text-primary)' }}>{s.name}</span>
                                        <span className="text-[13px] mt-1 block font-medium" style={{ color: st.ok ? 'var(--text-secondary)' : '#FF3B30' }}>{st.text}</span>
                                    </button>
                                    <div className="flex min-h-[56px]">
                                        {columns.map((c) => {
                                            const v = s.attendance?.[c.id] ?? 0;
                                            return (
                                                <button
                                                    key={c.id}
                                                    type="button"
                                                    onClick={(e) => { e.stopPropagation(); onCellTap(s, c.id); }}
                                                    className={`visit-cell-btn ${colw} flex items-center justify-center border-l border-black/[0.04] first:border-l-0 rounded-r-md`}
                                                    style={{ WebkitTapHighlightColor: 'transparent' }}
                                                >
                                                    {visitMarkNode(v)}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function App() {
            const initial = useMemo(() => loadAppState(), []);
            const subjects = initial.subjects;
            const [students, setStudents] = useState(initial.students);
            const [lessonColumnsByCategory, setLessonColumnsByCategory] = useState(initial.lessonColumnsByCategory);

            const [activeTab, setActiveTab] = useState('children');
            const [query, setQuery] = useState('');
            const [studentFormOpen, setStudentFormOpen] = useState(false);
            const [sheetStudentId, setSheetStudentId] = useState(null);
            const [columnsEditorOpen, setColumnsEditorOpen] = useState(false);

            useEffect(() => { setupPwaManifest(); }, []);

            const persistRef = useRef({ students, subjects, lessonColumnsByCategory });
            persistRef.current = { students, subjects, lessonColumnsByCategory };

            useEffect(() => {
                saveAppState(students, subjects, lessonColumnsByCategory);
            }, [students, subjects, lessonColumnsByCategory]);

            useEffect(() => {
                const flush = () => {
                    const p = persistRef.current;
                    saveAppState(p.students, p.subjects, p.lessonColumnsByCategory);
                };
                window.addEventListener('pagehide', flush);
                window.addEventListener('beforeunload', flush);
                return () => {
                    window.removeEventListener('pagehide', flush);
                    window.removeEventListener('beforeunload', flush);
                };
            }, []);

            const filtered = useMemo(() => {
                const q = query.trim().toLowerCase();
                return students.filter((s) => {
                    if (s.category !== activeTab) return false;
                    if (q && !s.name.toLowerCase().includes(q)) return false;
                    return true;
                });
            }, [students, activeTab, query]);

            const columns = lessonColumnsByCategory[activeTab] || [];

            const upsertStudent = useCallback((student) => {
                setStudents((prev) => {
                    const i = prev.findIndex((x) => x.id === student.id);
                    const norm = normalizeStudent(student, subjects);
                    if (i === -1) return [...prev, norm];
                    const next = [...prev];
                    next[i] = norm;
                    return next;
                });
            }, [subjects]);

            const deleteStudent = useCallback((id) => {
                setStudents((prev) => prev.filter((s) => s.id !== id));
            }, []);

            const addStudent = useCallback((name) => {
                const t = todayISO();
                const payments = [{
                    id: uid(),
                    paidFrom: t,
                    paidUntil: addDaysISO(t, 28),
                    paidAt: t,
                    amount: 0
                }];
                upsertStudent({
                    id: uid(),
                    name,
                    category: activeTab,
                    subGroup: activeTab === 'women' ? 'group1' : 'default',
                    payments,
                    attendance: {}
                });
                setStudentFormOpen(false);
            }, [activeTab, upsertStudent]);

            const onCellTap = useCallback((student, columnId) => {
                setStudents((prev) => prev.map((s) => {
                    if (s.id !== student.id) return s;
                    const cur = Number(s.attendance?.[columnId]) || 0;
                    const nextVal = cycleVisit(cur);
                    const att = { ...s.attendance, [columnId]: nextVal };
                    return normalizeStudent({ ...s, attendance: att }, subjects);
                }));
            }, [subjects]);

            const sheetStudent = sheetStudentId ? students.find((s) => s.id === sheetStudentId) : null;

            return (
                <div className="app-bg min-h-screen min-h-[100dvh] max-w-lg mx-auto" style={{ color: 'var(--text-primary)' }}>
                    <header className="sticky top-0 z-40 safe-top header-glass border-b">
                        <div className="px-3 pt-3 pb-3">
                            <div className="flex items-center justify-between gap-2">
                                <div>
                                    <h1 className="text-[19px] font-bold tracking-tight leading-none">2FACE</h1>
                                    <p className="mt-1 text-[13px] font-semibold uppercase tracking-wide" style={{ color: 'var(--text-secondary)' }}>
                                        {CATEGORIES.find((c) => c.id === activeTab)?.label}
                                    </p>
                                </div>
                                <div className="flex gap-1.5 transition-[transform,opacity] duration-200 ease-out">
                                    <button type="button" onClick={() => setColumnsEditorOpen(true)} className="h-9 px-2.5 rounded-xl text-[13px] font-semibold active:scale-[0.97] transition-transform duration-200 ease-out" style={{ background: 'rgba(0,0,0,0.06)', color: 'var(--text-primary)' }}>Занятия</button>
                                    <button type="button" onClick={() => setStudentFormOpen(true)} className="h-9 px-2.5 rounded-xl bg-[#1C1C1E] text-white text-[13px] font-semibold active:scale-[0.97] transition-transform duration-200 ease-out">+ Ученик</button>
                                </div>
                            </div>
                            <input
                                type="search"
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                placeholder="Поиск ученика"
                                className="mt-3 h-11 w-full rounded-[12px] px-3 text-[16px] outline-none transition-shadow duration-200 ease-out border border-black/[0.06] bg-white shadow-[0_2px_8px_rgba(0,0,0,0.04)] focus:ring-2 focus:ring-[#34C759]/40"
                                style={{ color: 'var(--text-primary)' }}
                            />
                        </div>
                    </header>

                    <main className="px-2 py-3 pb-28">
                        {filtered.length === 0 ? (
                            <div className="rounded-[12px] bg-white p-8 text-center text-[16px] shadow-[0_2px_8px_rgba(0,0,0,0.04)]" style={{ color: 'var(--text-secondary)' }}>
                                Нет учеников. Нажмите «+ Ученик».
                            </div>
                        ) : (
                            <AttendanceTable
                                students={filtered}
                                columns={columns}
                                onCellTap={onCellTap}
                                onRowOpen={(s) => setSheetStudentId(s.id)}
                            />
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-[#1E272E] rounded-t-[2.5rem] px-2 pt-2.5 pb-5 safe-bottom z-50">
                        <div className="max-w-lg mx-auto flex justify-around">
                            {CATEGORIES.map((cat) => (
                                <button
                                    key={cat.id}
                                    type="button"
                                    onClick={() => setActiveTab(cat.id)}
                                    className={`relative py-2 px-1 min-w-[4.25rem] flex flex-col items-center active:scale-95 transition-transform ${activeTab === cat.id ? 'text-[#55E6C1]' : 'text-slate-500'}`}
                                >
                                    {activeTab === cat.id && <div className="active-tab-indicator" />}
                                    <span className="text-[10px] font-bold uppercase text-center leading-tight">{cat.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {studentFormOpen && (
                        <div className="fixed inset-0 z-[70]">
                            <div className="absolute inset-0 bg-black/35" onClick={() => setStudentFormOpen(false)} />
                            <section className="absolute bottom-0 inset-x-0 bg-white rounded-t-[2rem] p-4 safe-bottom sheet-shadow">
                                <div className="w-10 h-1.5 bg-slate-200 rounded-full mx-auto mb-3" />
                                <h3 className="text-base font-bold mb-3">Новый ученик</h3>
                                <AddStudentForm onCancel={() => setStudentFormOpen(false)} onSave={(f) => addStudent(f.name)} />
                            </section>
                        </div>
                    )}

                    {sheetStudent && (
                        <StudentCardSheet
                            student={sheetStudent}
                            subjects={subjects}
                            onClose={() => setSheetStudentId(null)}
                            onSaveStudent={upsertStudent}
                            onDeleteStudent={deleteStudent}
                        />
                    )}

                    {columnsEditorOpen && (
                        <LessonColumnsEditor
                            columns={columns}
                            onClose={() => setColumnsEditorOpen(false)}
                            onSave={(next) => {
                                const safe = next.length ? next : defaultLessonColumnsForCategory(activeTab, subjects);
                                setLessonColumnsByCategory((prev) => ({ ...prev, [activeTab]: safe }));
                                setColumnsEditorOpen(false);
                            }}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
