<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2Face Mobile CRM</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #F8F9FA;
            user-select: none;
            margin: 0;
        }
        /* Индикатор активной вкладки в нижнем меню */
        .active-tab-indicator {
            position: absolute;
            top: -10px;
            width: 24px;
            height: 4px;
            background-color: #55E6C1;
            border-radius: 2px;
        }
        /* Кнопки предметов делаем квадратными */
        .visit-btn {
            aspect-ratio: 1 / 1;
            touch-action: manipulation;
        }
        /* Отступ для айфонов с челкой внизу */
        .safe-area-inset-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        /* Плавное появление карточек */
        .card-appear {
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-32">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const CATEGORIES = [
            { id: 'children', label: 'Дети' },
            { id: 'teens', label: 'Подростки' },
            { id: 'women', label: 'Women' },
            { id: 'intensive', label: 'Интенсив' }
        ];

        const App = () => {
            // Состояние учеников (загружаем из памяти браузера)
            const [students, setStudents] = useState(() => {
                const saved = localStorage.getItem('2face_students_final');
                return saved ? JSON.parse(saved) : [];
            });

            const [activeTab, setActiveTab] = useState('children');
            const [womenGroup, setWomenGroup] = useState('group1');
            const [searchQuery, setSearchQuery] = useState('');

            // Названия предметов (можно менять через интерфейс)
            const [globalSubjects, setGlobalSubjects] = useState(() => {
                const saved = localStorage.getItem('2face_subjects_final');
                return saved ? JSON.parse(saved) : { 0: "Дефиле", 1: "Фото", 2: "Актер", 3: "Пласт" };
            });

            // Сохраняем всё при каждом изменении
            useEffect(() => {
                localStorage.setItem('2face_students_final', JSON.stringify(students));
                localStorage.setItem('2face_subjects_final', JSON.stringify(globalSubjects));
            }, [students, globalSubjects]);

            const handleAddStudent = () => {
                const name = prompt("Введите имя и фамилию ученика:");
                if (!name) return;
                
                const today = new Date().toISOString().split('T')[0];
                const end = new Date();
                end.setDate(end.getDate() + 28);
                
                const firstPeriod = {
                    id: Date.now() + 1,
                    startDate: today,
                    endDate: end.toISOString().split('T')[0],
                    paymentInfo: { isPaid: true, amount: '5000' },
                    visits: {}
                };

                setStudents([...students, { 
                    id: Date.now(), 
                    name, 
                    category: activeTab, 
                    subGroup: activeTab === 'women' ? womenGroup : 'default',
                    currentPeriodIndex: 0, 
                    periods: [firstPeriod] 
                }]);
            };

            const toggleVisit = (studentId, colIndex) => {
                setStudents(prev => prev.map(s => {
                    if (s.id === studentId) {
                        const newPeriods = [...s.periods];
                        const period = { ...newPeriods[s.currentPeriodIndex] };
                        period.visits = { ...period.visits };
                        period.visits[colIndex] = !period.visits[colIndex];
                        newPeriods[s.currentPeriodIndex] = period;
                        return { ...s, periods: newPeriods };
                    }
                    return s;
                }));
            };

            const togglePayment = (studentId) => {
                setStudents(prev => prev.map(s => {
                    if (s.id === studentId) {
                        const newPeriods = [...s.periods];
                        const period = { ...newPeriods[s.currentPeriodIndex] };
                        period.paymentInfo.isPaid = !period.paymentInfo.isPaid;
                        newPeriods[s.currentPeriodIndex] = period;
                        return { ...s, periods: newPeriods };
                    }
                    return s;
                }));
            };

            const filteredStudents = useMemo(() => 
                students.filter(s => {
                    const matchTab = s.category === activeTab;
                    const matchGroup = activeTab === 'women' ? s.subGroup === womenGroup : true;
                    return matchTab && matchGroup && s.name.toLowerCase().includes(searchQuery.toLowerCase());
                }), 
            [students, activeTab, womenGroup, searchQuery]);

            return (
                <div className="max-w-md mx-auto min-h-screen">
                    {/* ШАПКА ПРИЛОЖЕНИЯ */}
                    <header className="bg-white/80 backdrop-blur-md px-5 pt-6 pb-4 sticky top-0 z-40 border-b border-gray-100">
                        <div className="flex justify-between items-center mb-5">
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter text-[#1E272E]">2FACE</h1>
                                <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Model Management</p>
                            </div>
                            <button onClick={handleAddStudent} className="bg-[#1E272E] text-white px-5 py-2.5 rounded-2xl font-bold text-[11px] uppercase tracking-wider shadow-lg active:scale-95 transition-all">
                                + Ученик
                            </button>
                        </div>
                        
                        <input 
                            type="text" 
                            placeholder="Поиск по фамилии..." 
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            className="w-full bg-gray-100 border-none rounded-2xl py-3 px-5 text-sm font-medium outline-none focus:ring-2 focus:ring-[#55E6C1] mb-2 shadow-inner"
                        />

                        {activeTab === 'women' && (
                            <div className="flex bg-gray-100 p-1 rounded-xl gap-1 mt-2">
                                {['group1', 'group2'].map(g => (
                                    <button 
                                        key={g} 
                                        onClick={() => setWomenGroup(g)}
                                        className={`flex-1 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${womenGroup === g ? 'bg-white text-[#1E272E] shadow-sm' : 'text-gray-400'}`}
                                    >
                                        {g === 'group1' ? 'Группа 1' : 'Группа 2'}
                                    </button>
                                ))}
                            </div>
                        )}
                    </header>

                    {/* ОСНОВНОЙ КОНТЕНТ */}
                    <main className="p-4 space-y-6">
                        <div className="flex justify-between items-center px-2">
                             <h2 className="text-[11px] font-black text-gray-400 uppercase tracking-[0.2em]">
                                {CATEGORIES.find(c => c.id === activeTab)?.label}
                            </h2>
                            <span className="bg-gray-200 text-gray-500 text-[10px] font-black px-2 py-0.5 rounded-full">
                                {filteredStudents.length}
                            </span>
                        </div>

                        {filteredStudents.length === 0 ? (
                            <div className="bg-white rounded-[2.5rem] p-12 text-center border-2 border-dashed border-gray-100">
                                <div className="text-4xl mb-4 opacity-20 text-gray-400">📁</div>
                                <p className="text-gray-400 font-bold text-sm">Список пуст</p>
                            </div>
                        ) : (
                            filteredStudents.map(student => {
                                const period = student.periods[student.currentPeriodIndex];
                                return (
                                    <div key={student.id} className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-gray-100 relative active:scale-[0.98] transition-transform card-appear">
                                        <div className="flex justify-between items-start mb-6">
                                            <div className="max-w-[60%]">
                                                <h3 className="text-xl font-black text-[#1E272E] leading-tight mb-1 truncate">{student.name}</h3>
                                                <div className="flex items-center gap-2 text-[10px] font-bold text-gray-400">
                                                    <span className="bg-gray-100 px-2 py-0.5 rounded-md italic">
                                                        {new Date(period.startDate).toLocaleDateString('ru-RU', {day: 'numeric', month: 'short'})} — {new Date(period.endDate).toLocaleDateString('ru-RU', {day: 'numeric', month: 'short'})}
                                                    </span>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={() => togglePayment(student.id)}
                                                className={`px-4 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-wider transition-all border shadow-sm ${
                                                    period.paymentInfo.isPaid 
                                                    ? 'bg-[#E8F8F2] border-[#55E6C1]/30 text-[#2D6A4F]' 
                                                    : 'bg-[#FFF0F0] border-[#FF7675]/30 text-[#C0392B]'
                                                }`}
                                            >
                                                {period.paymentInfo.isPaid ? 'Оплачено' : 'Долг 5000'}
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-4 gap-4">
                                            {[0, 1, 2, 3].map(idx => (
                                                <button 
                                                    key={idx}
                                                    onClick={() => toggleVisit(student.id, idx)}
                                                    className={`visit-btn rounded-[1.5rem] border-2 flex flex-col items-center justify-center transition-all ${
                                                        period.visits[idx] 
                                                        ? 'bg-[#1E272E] border-[#1E272E] text-white shadow-lg' 
                                                        : 'bg-gray-50 border-gray-100 text-gray-300 hover:border-gray-200'
                                                    }`}
                                                >
                                                    <span className={`text-[8px] font-black uppercase mb-1.5 ${period.visits[idx] ? 'text-[#55E6C1]' : 'text-gray-400'}`}>
                                                        {globalSubjects[idx]}
                                                    </span>
                                                    <div className={`w-6 h-6 rounded-full flex items-center justify-center font-bold text-sm ${period.visits[idx] ? 'bg-white/10' : ''}`}>
                                                        {period.visits[idx] ? '✓' : '•'}
                                                    </div>
                                                </button>
                                            ))}
                                        </div>

                                        <div className="mt-6 pt-5 border-t border-gray-50 flex justify-between items-center">
                                            <button 
                                                onClick={() => {
                                                    const subjectNumber = prompt("Введите номер предмета для изменения: 1, 2, 3 или 4");
                                                    const subjectIndex = Number(subjectNumber) - 1;
                                                    if (![0, 1, 2, 3].includes(subjectIndex)) return;
                                                    const newSub = prompt("Новое название предмета:", globalSubjects[subjectIndex]);
                                                    if(newSub) setGlobalSubjects(prev => ({...prev, [subjectIndex]: newSub}));
                                                }}
                                                className="text-[10px] font-bold text-gray-300 hover:text-gray-500 uppercase tracking-tight p-1"
                                            >
                                                Настроить
                                            </button>
                                            <button 
                                                onClick={() => { if(confirm("Удалить ученика?")) setStudents(students.filter(s => s.id !== student.id)) }}
                                                className="bg-red-50 text-red-300 text-[10px] font-black px-3 py-1 rounded-full uppercase"
                                            >
                                                Удалить
                                            </button>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </main>

                    {/* НИЖНЯЯ ПАНЕЛЬ НАВИГАЦИИ */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-[#1E272E] pt-4 pb-10 px-4 flex justify-around items-center z-50 rounded-t-[3rem] shadow-[0_-10px_40px_rgba(0,0,0,0.3)] safe-area-inset-bottom">
                        {CATEGORIES.map(cat => (
                            <button 
                                key={cat.id}
                                onClick={() => setActiveTab(cat.id)}
                                className={`flex flex-col items-center relative py-2 transition-all active:scale-90 ${activeTab === cat.id ? 'text-[#55E6C1]' : 'text-gray-500'}`}
                            >
                                {activeTab === cat.id && <div className="active-tab-indicator"></div>}
                                <span className="text-[11px] font-black uppercase tracking-wider">{cat.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
